<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tubemin</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <div class="popup-topbar">
    <span class="popup-logo">▶ TUBEMIN</span>
    <a class="popup-topbar-link" id="dashboard-btn" title="Open Dashboard">⊞</a>
    <a class="popup-topbar-link" id="settings-link" title="Settings">⚙</a>
  </div>
  <div class="popup-content">

    <!-- URL mode (default) -->
    <div id="url-section">
      <div class="url-box">
        <div class="url-box-site" id="url-site"></div>
        <div class="url-box-text" id="url-preview"></div>
      </div>
    </div>

    <!-- List mode (when videos are captured) -->
    <div id="video-list-section" hidden>
      <div class="video-list-toprow">
        <div class="video-list-header" id="video-list-header"></div>
        <div class="video-list-actions">
          <button type="button" id="select-all-btn" class="btn-secondary btn-xs">All</button>
          <button type="button" id="unselect-all-btn" class="btn-secondary btn-xs">None</button>
        </div>
      </div>
      <div class="video-list" id="video-list"></div>
    </div>

    <button id="send-btn" type="button" disabled>Queue Video</button>
    <div id="hint"></div>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
