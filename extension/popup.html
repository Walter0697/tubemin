<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tubemin</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <div class="popup-topbar">
    <span class="popup-logo">▶ TUBEMIN</span>
    <a class="popup-settings-link" id="settings-link" title="Settings">⚙</a>
  </div>
  <div class="popup-content">
    <div class="url-box">
      <div class="url-box-site" id="url-site"></div>
      <div class="url-box-text" id="url-preview"></div>
    </div>
    <button id="send-btn" type="button" disabled>Queue Video</button>
    <button id="dashboard-btn" type="button" class="btn-secondary" style="width:100%;margin-top:6px;padding:7px;">Open Dashboard</button>
    <div id="hint"></div>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
