<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tubemin Settings</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <div class="settings-body">
    <p class="settings-title">▶ TUBEMIN — Settings</p>

    <label class="field-label" for="server-url">Server URL</label>
    <input type="text" id="server-url" placeholder="https://tubemin.yourdomain.com" />

    <label class="field-label">API Key</label>
    <div id="key-display" style="display:none">
      <div class="field-row">
        <span class="key-masked" id="key-masked"></span>
        <button id="change-btn" type="button" class="btn-secondary">Change</button>
      </div>
    </div>
    <div id="key-input">
      <input type="password" id="api-key" placeholder="Paste API key from Tubemin settings" />
    </div>

    <button id="save-btn" type="button" class="btn-full">Save</button>
    <button id="test-btn" type="button" class="btn-test">Test Connection</button>
    <div id="settings-status"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
