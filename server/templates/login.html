<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tubemin — Sign in</title>
  <style>
    body { font-family: sans-serif; max-width: 380px; margin: 100px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 1.25rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.875rem; margin-bottom: 4px; color: #555; }
    input[type="password"] {
      width: 100%; box-sizing: border-box; padding: 8px 10px;
      border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; margin-bottom: 16px;
    }
    button {
      width: 100%; padding: 10px; background: #2563eb; color: white;
      border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .error { color: #c00; font-size: 0.875rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>Tubemin</h1>
  <!--ERROR-->
  <form method="POST" action="/auth/login">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus required>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
