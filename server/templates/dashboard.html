<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tubemin — Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <span class="nav-logo">▶ TUBEMIN</span>
    <a href="/dashboard" class="nav-link active">Dashboard</a>
    <a href="/settings" class="nav-link">Settings</a>
  </nav>
  <div class="page">
    <h1 class="page-title">Dashboard</h1>
    <p class="section-title">Recent Submissions</p>
    <table class="data-table">
      <thead>
        <tr>
          <th>URL</th>
          <th>Status</th>
          <th>Submitted</th>
        </tr>
      </thead>
      <tbody>
        {% for s in submissions %}
        <tr>
          <td><a href="{{ s.url }}" target="_blank">{{ s.url }}</a></td>
          <td><span class="status-dot status-{{ s.status }}"></span>{{ s.status }}</td>
          <td>{{ s.submitted_at }}</td>
        </tr>
        {% else %}
        <tr>
          <td colspan="3" class="empty-cell">No submissions yet.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
