<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tubemin — Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/favicon.png">
</head>
<body>
  <nav>
    <span class="nav-logo"><img src="/static/favicon.png" class="nav-icon" alt="">TUBEMIN</span>
    <a href="/dashboard" class="nav-link active">Dashboard</a>
    <a href="/settings" class="nav-link">Settings</a>
  </nav>
  <div class="page">
    <h1 class="page-title">Dashboard</h1>
    <div class="card-grid">
      {% for s in submissions %}
      <a class="card{% if s.status == 'pending' or s.status == 'downloading' %} processing{% endif %}"
         href="{{ s.url }}" target="_blank"
         data-url="{{ s.url }}" data-ts="{{ s.submitted_at }}"
         {% if s.peertube_thumb %}data-thumb="{{ s.peertube_thumb }}"{% endif %}>
        <div class="card-thumb"></div>
        <div class="card-body">
          <div class="card-site"></div>
          <div class="card-title">{% if s.title %}{{ s.title }}{% endif %}</div>
          <div class="card-url">{{ s.url }}</div>
          <div class="card-footer">
            <span class="card-status">
              <span class="status-dot status-{{ s.status }}"></span>{{ s.status }}
            </span>
            <span class="card-time">{{ s.submitted_at }}</span>
          </div>
        </div>
      </a>
      {% else %}
      <p style="grid-column:1/-1; color:var(--text-dim); margin:0; padding:20px 0;">No submissions yet.</p>
      {% endfor %}
    </div>
  </div>
  <script src="/static/app.js"></script>
  <script>
    const PEERTUBE_BASE = "{{ peertube_base }}";

    function ytId(url) {
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
        if (u.hostname.includes('youtube.com') || u.hostname.includes('music.youtube.com')) {
          return u.searchParams.get('v') ||
            (u.pathname.includes('/shorts/') ? u.pathname.split('/').pop() : null);
        }
      } catch {}
      return null;
    }

    function siteHost(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
    }

    function relTime(ts) {
      const s = (Date.now() - new Date(ts)) / 1000;
      if (s < 60)    return 'just now';
      if (s < 3600)  return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }

    function setPlaceholder(el, url) {
      el.innerHTML =
        '<div class="card-thumb-placeholder">' +
        '<span class="ph-icon">▶</span>' +
        '<span class="ph-site">' + siteHost(url) + '</span>' +
        '</div>';
    }

    let hasProcessing = false;

    document.querySelectorAll('a.card').forEach(card => {
      const url = card.dataset.url;
      const thumb = card.querySelector('.card-thumb');
      const site = card.querySelector('.card-site');
      const timeEl = card.querySelector('.card-time');

      site.textContent = siteHost(url);
      if (timeEl) timeEl.textContent = relTime(card.dataset.ts);

      const peertubePath = card.dataset.thumb;
      const img = document.createElement('img');
      img.alt = '';
      img.onerror = () => { img.remove(); setPlaceholder(thumb, url); };

      if (peertubePath && PEERTUBE_BASE) {
        img.src = PEERTUBE_BASE + peertubePath;
        thumb.appendChild(img);
      } else {
        const id = ytId(url);
        if (id) {
          img.src = 'https://img.youtube.com/vi/' + id + '/mqdefault.jpg';
          thumb.appendChild(img);
        } else {
          setPlaceholder(thumb, url);
        }
      }

      if (card.classList.contains('processing')) hasProcessing = true;
    });

    if (hasProcessing) setTimeout(() => location.reload(), 5000);
  </script>
</body>
</html>
