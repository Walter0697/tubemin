<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tubemin — Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/favicon.png">
</head>
<body>
  <nav>
    <span class="nav-logo"><img src="/static/favicon.png" class="nav-icon" alt="">TUBEMIN</span>
    <a href="/dashboard" class="nav-link active">Dashboard</a>
    <a href="/settings" class="nav-link">Settings</a>
  </nav>
  <div class="page">
    <div class="dashboard-header">
      <h1 class="page-title">Dashboard</h1>
    </div>

    <div class="filter-bar">
      <div class="filter-tabs">
        <button class="filter-tab active" data-status="all">All<span class="filter-count" id="count-all"></span></button>
        <button class="filter-tab" data-status="pending">Pending<span class="filter-count" id="count-pending"></span></button>
        <button class="filter-tab" data-status="downloading">Downloading<span class="filter-count" id="count-downloading"></span></button>
        <button class="filter-tab" data-status="transcoding">Transcoding<span class="filter-count" id="count-transcoding"></span></button>
        <button class="filter-tab" data-status="complete">Complete<span class="filter-count" id="count-complete"></span></button>
        <button class="filter-tab" data-status="imported">Imported<span class="filter-count" id="count-imported"></span></button>
        <button class="filter-tab" data-status="error">Error<span class="filter-count" id="count-error"></span></button>
      </div>
      <input type="text" id="search-input" class="search-input" placeholder="Search titles or URLs…">
    </div>

    <div class="bulk-toolbar" id="bulk-toolbar" hidden>
      <span class="bulk-count" id="bulk-count">0 selected</span>
      <button class="btn-secondary" id="bulk-select-all-btn">Select all</button>
      <button class="btn-danger" id="bulk-delete-btn">Delete selected</button>
      <button class="btn-secondary" id="bulk-cancel-btn">Cancel</button>
    </div>

    <div class="card-grid" id="card-grid">
      <p class="empty-msg" id="empty-msg" hidden>No submissions yet.</p>
    </div>

    <div class="pagination" id="pagination" hidden>
      <button id="prev-btn" class="btn-secondary" disabled>← Prev</button>
      <span class="pagination-info" id="pagination-info"></span>
      <button id="next-btn" class="btn-secondary">Next →</button>
    </div>
  </div>

  <div class="modal-overlay" id="confirm-modal" hidden>
    <div class="modal-box">
      <p class="modal-msg" id="modal-msg"></p>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button class="btn-danger" id="modal-confirm-btn">Delete</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detail-modal" hidden>
    <div class="modal-box detail-modal-box">
      <div class="detail-modal-thumb" id="detail-modal-thumb">
        <button class="detail-modal-close" id="detail-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="detail-modal-body">
        <div class="detail-modal-status" id="detail-modal-status"></div>
        <h2 class="detail-modal-title" id="detail-modal-title"></h2>
        <div class="detail-modal-rows" id="detail-modal-rows"></div>
        <div class="detail-modal-actions" id="detail-modal-actions"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    const PEERTUBE_BASE = "{{ peertube_base | safe }}";
    const PER_PAGE = 24;

    let currentPage   = 1;
    let currentStatus = 'all';
    let currentSearch = '';
    let currentTotal  = 0;
    let pollTimer     = null;
    let searchDebounce = null;
    let selectMode    = false;
    const cardMap = new Map();
    const submissionMap = new Map();
    const selectedIds = new Set();

    // ── Helpers ──────────────────────────────────────────────────────────────

    function ytId(url) {
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
        if (u.hostname.includes('youtube.com') || u.hostname.includes('music.youtube.com'))
          return u.searchParams.get('v') ||
            (u.pathname.includes('/shorts/') ? u.pathname.split('/').pop() : null);
      } catch {}
      return null;
    }

    function siteHost(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
    }

    function relTime(ts) {
      const s = (Date.now() - new Date(ts)) / 1000;
      if (s < 60)    return 'just now';
      if (s < 3600)  return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }

    function setPlaceholder(thumbEl, url) {
      thumbEl.innerHTML =
        '<div class="card-thumb-placeholder">' +
          '<span class="ph-icon">▶</span>' +
          '<span class="ph-site">' + siteHost(url) + '</span>' +
        '</div>';
    }

    // ── Card rendering ────────────────────────────────────────────────────────

    function buildCard(s) {
      submissionMap.set(s.id, s);
      const card = document.createElement('a');
      card.className = 'card' + (isProcessing(s.status) ? ' processing' : '') + (selectMode ? ' select-mode' : '');
      card.href = s.source_url || s.url;
      card.target = '_blank';
      card.dataset.id  = s.id;
      card.dataset.url = s.url;
      card.dataset.ts  = s.submitted_at;
      if (s.peertube_thumb) card.dataset.thumb = s.peertube_thumb;

      card.innerHTML =
        '<input type="checkbox" class="card-checkbox" aria-label="Select">' +
        '<div class="card-thumb"></div>' +
        '<div class="card-body">' +
          '<div class="card-site"></div>' +
          '<div class="card-title">' + (s.title ? escHtml(s.title) : '') + '</div>' +
          '<div class="card-url">' + escHtml(s.url) + '</div>' +
          '<div class="card-footer">' +
            '<span class="card-status">' +
              '<span class="status-dot status-' + s.status + '"></span>' + s.status +
            '</span>' +
            '<span class="card-time">' + relTime(s.submitted_at) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="card-progress-track" hidden><div class="card-progress"></div></div>' +
        '<button class="card-delete-btn" title="Delete" aria-label="Delete">🗑</button>';

      const cb = card.querySelector('.card-checkbox');
      cb.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        if (!selectMode) enterSelectMode();
        toggleSelect(s.id, card, cb);
      });

      const delBtn = card.querySelector('.card-delete-btn');
      delBtn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        confirmDelete([s.id]);
      });

      card.addEventListener('click', e => {
        if (selectMode) {
          e.preventDefault();
          toggleSelect(s.id, card, cb);
        } else {
          e.preventDefault();
          openDetail(submissionMap.get(s.id) || s);
        }
      });

      hydrateCard(card, s);
      return card;
    }

    function enterSelectMode() {
      selectMode = true;
      document.querySelectorAll('.card').forEach(c => c.classList.add('select-mode'));
      document.getElementById('bulk-toolbar').hidden = false;
    }

    function exitSelectMode() {
      selectMode = false;
      selectedIds.clear();
      document.querySelectorAll('.card').forEach(c => {
        c.classList.remove('select-mode', 'card-selected');
        const cb = c.querySelector('.card-checkbox');
        if (cb) cb.classList.remove('is-checked');
      });
      document.getElementById('bulk-toolbar').hidden = true;
      updateBulkCount();
    }

    function toggleSelect(id, card, cb) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
        card.classList.remove('card-selected');
        cb.classList.remove('is-checked');
      } else {
        selectedIds.add(id);
        card.classList.add('card-selected');
        cb.classList.add('is-checked');
      }
      updateBulkCount();
    }

    function updateBulkCount() {
      const el = document.getElementById('bulk-count');
      if (el) el.textContent = selectedIds.size + ' selected';
    }

    function confirmDelete(ids) {
      const n = ids.length;
      const modal = document.getElementById('confirm-modal');
      document.getElementById('modal-msg').textContent =
        `Delete ${n} submission${n > 1 ? 's' : ''}? This will also remove the video${n > 1 ? 's' : ''} from PeerTube.`;
      modal.hidden = false;
      document.getElementById('modal-confirm-btn').onclick = async () => {
        modal.hidden = true;
        await doDelete(ids);
      };
      document.getElementById('modal-cancel-btn').onclick = () => {
        modal.hidden = true;
      };
      modal.onclick = e => {
        if (e.target === modal) modal.hidden = true;
      };
    }

    function openDetail(s) {
      const modal  = document.getElementById('detail-modal');
      const thumb  = document.getElementById('detail-modal-thumb');
      const status = document.getElementById('detail-modal-status');
      const title  = document.getElementById('detail-modal-title');
      const rows   = document.getElementById('detail-modal-rows');
      const acts   = document.getElementById('detail-modal-actions');

      // Thumbnail
      const closeBtn = thumb.querySelector('.detail-modal-close');
      thumb.innerHTML = '';
      thumb.appendChild(closeBtn);
      const peertubePath = s.peertube_thumb;
      if (peertubePath && PEERTUBE_BASE) {
        const img = document.createElement('img');
        img.alt = '';
        img.onerror = () => { img.remove(); };
        img.src = PEERTUBE_BASE + peertubePath;
        thumb.appendChild(img);
      } else {
        const id = ytId(s.url);
        if (id) {
          const img = document.createElement('img');
          img.alt = '';
          img.onerror = () => { img.remove(); };
          img.src = 'https://img.youtube.com/vi/' + id + '/mqdefault.jpg';
          thumb.appendChild(img);
        }
      }

      // Status
      const pctLabel = (s.progress != null && (s.status === 'downloading' || s.status === 'pending'))
        ? ' — ' + Math.round(s.progress * 100) + '%'
        : '';
      status.innerHTML =
        '<span class="status-dot status-' + s.status + '"></span>' +
        '<span>' + s.status + escHtml(pctLabel) + '</span>';

      // Title
      title.textContent = s.title || siteHost(s.url);

      // Detail rows
      rows.innerHTML = '';
      function addRow(label, html) {
        rows.innerHTML +=
          '<div class="detail-row">' +
            '<div class="detail-row-label">' + label + '</div>' +
            '<div class="detail-row-value">' + html + '</div>' +
          '</div>';
      }

      // Show source page if we have one, otherwise the submission URL is the real page (MeTube path)
      const pageLink = s.source_url || s.url;
      addRow('Source',
        '<a href="' + escHtml(pageLink) + '" target="_blank" rel="noopener">' +
          escHtml(pageLink) + ' ↗</a>');

      addRow('Submitted', relTime(s.submitted_at) + ' <span style="color:var(--text-dim)">(' + new Date(s.submitted_at).toLocaleString() + ')</span>');

      if (s.updated_at !== s.submitted_at) {
        addRow('Updated', relTime(s.updated_at) + ' <span style="color:var(--text-dim)">(' + new Date(s.updated_at).toLocaleString() + ')</span>');
      }

      // Action buttons
      acts.innerHTML = '';
      if (s.peertube_uuid && PEERTUBE_BASE) {
        const ptBtn = document.createElement('a');
        ptBtn.href = PEERTUBE_BASE + '/videos/watch/' + s.peertube_uuid;
        ptBtn.target = '_blank';
        ptBtn.rel = 'noopener';
        ptBtn.className = 'detail-btn detail-btn-primary';
        ptBtn.innerHTML = '▶ Watch on PeerTube';
        acts.appendChild(ptBtn);
      }
      const srcBtn = document.createElement('a');
      srcBtn.href = pageLink;
      srcBtn.target = '_blank';
      srcBtn.rel = 'noopener';
      srcBtn.className = 'detail-btn detail-btn-secondary';
      srcBtn.innerHTML = '↗ Source page';
      acts.appendChild(srcBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'detail-btn detail-btn-danger';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', () => {
        document.getElementById('detail-modal').hidden = true;
        confirmDelete([s.id]);
      });
      acts.appendChild(delBtn);

      modal.hidden = false;

      rows.querySelectorAll('.detail-copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(btn.dataset.copy).then(() => {
            const orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = orig, 1500);
          });
        });
      });
    }

    async function doDelete(ids) {
      const res = await fetch('/api/submissions/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids }),
      });
      if (!res.ok) { alert('Delete failed'); return; }
      ids.forEach(id => {
        const card = cardMap.get(id);
        if (card) card.remove();
        cardMap.delete(id);
      });
      exitSelectMode();
      // Reload to update counts and pagination
      const data = await loadPage(currentPage, currentStatus, currentSearch);
      if (data) applyData(data, false);
    }

    function hydrateCard(card, s) {
      const thumb  = card.querySelector('.card-thumb');
      const siteEl = card.querySelector('.card-site');
      if (siteEl) siteEl.textContent = siteHost(s.url);

      const peertubePath = s.peertube_thumb || card.dataset.thumb;
      if (peertubePath && PEERTUBE_BASE) {
        const img = document.createElement('img');
        img.alt = '';
        img.onerror = () => { img.remove(); setPlaceholder(thumb, s.url); };
        img.src = PEERTUBE_BASE + peertubePath;
        thumb.innerHTML = '';
        thumb.appendChild(img);
      } else {
        const id = ytId(s.url);
        if (id) {
          const img = document.createElement('img');
          img.alt = '';
          img.onerror = () => { img.remove(); setPlaceholder(thumb, s.url); };
          img.src = 'https://img.youtube.com/vi/' + id + '/mqdefault.jpg';
          thumb.innerHTML = '';
          thumb.appendChild(img);
        } else {
          setPlaceholder(thumb, s.url);
        }
      }
    }

    function updateCardStatus(card, s) {
      const dot    = card.querySelector('.status-dot');
      const label  = card.querySelector('.card-status');
      const titleEl = card.querySelector('.card-title');
      const proc   = isProcessing(s.status);

      if (dot) {
        dot.className = 'status-dot status-' + s.status;
        dot.nextSibling.textContent = s.status;
      }
      if (titleEl && s.title) {
        titleEl.textContent = s.title;
      }
      card.classList.toggle('processing', proc);

      const track = card.querySelector('.card-progress-track');
      const bar   = card.querySelector('.card-progress');
      if (track && bar) {
        const pct = (s.progress != null) ? s.progress : null;
        if (pct != null && (s.status === 'downloading' || s.status === 'pending')) {
          track.hidden = false;
          bar.style.width = Math.round(pct * 100) + '%';
          track.title = Math.round(pct * 100) + '%';
        } else {
          track.hidden = true;
          bar.style.width = '0%';
        }
      }

      const statusLabel = card.querySelector('.card-status');
      if (statusLabel) {
        const pct = (s.progress != null && (s.status === 'downloading' || s.status === 'pending'))
          ? ' ' + Math.round(s.progress * 100) + '%'
          : '';
        statusLabel.innerHTML =
          '<span class="status-dot status-' + s.status + '"></span>' +
          s.status + escHtml(pct);
      }

      // Pick up thumbnail once imported
      if (s.peertube_thumb && !card.dataset.thumb) {
        card.dataset.thumb = s.peertube_thumb;
        hydrateCard(card, s);
      }
      submissionMap.set(s.id, s);
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function isProcessing(status) {
      return status === 'pending' || status === 'downloading' || status === 'transcoding';
    }

    // ── Data fetching & rendering ─────────────────────────────────────────────

    async function loadPage(page, status, search) {
      const params = new URLSearchParams({ page, per_page: PER_PAGE, status });
      if (search) params.set('q', search);
      const res = await fetch('/api/submissions?' + params);
      if (!res.ok) return;
      return res.json();
    }

    async function fadeGrid(fn) {
      const grid = document.getElementById('card-grid');
      grid.classList.add('grid-fading');
      await new Promise(r => setTimeout(r, 160));
      fn();
      grid.classList.remove('grid-fading');
    }

    function applyData(data, isRefresh) {
      currentTotal = data.total;

      // Update filter counts
      const tabs = ['all', 'pending', 'downloading', 'transcoding', 'complete', 'imported', 'error'];
      tabs.forEach(s => {
        const el = document.getElementById('count-' + s);
        if (el) el.textContent = data.counts[s] ? ' ' + data.counts[s] : '';
      });

      const grid     = document.getElementById('card-grid');
      const emptyMsg = document.getElementById('empty-msg');

      if (isRefresh) {
        // Smart diff: update existing cards, prepend new ones (on page 1)
        const seen = new Set();
        data.submissions.forEach(s => {
          seen.add(s.id);
          if (cardMap.has(s.id)) {
            updateCardStatus(cardMap.get(s.id), s);
          } else if (currentPage === 1) {
            const card = buildCard(s);
            card.classList.add('card-new');
            grid.insertBefore(card, grid.firstChild);
            cardMap.set(s.id, card);
          }
        });
      } else {
        // Full replace for filter/page changes
        // Remove old cards from map that aren't in this page
        cardMap.clear();
        submissionMap.clear();
        const frag = document.createDocumentFragment();
        data.submissions.forEach(s => {
          const card = buildCard(s);
          cardMap.set(s.id, card);
          frag.appendChild(card);
        });
        // Clear grid content except emptyMsg
        Array.from(grid.children).forEach(c => { if (c !== emptyMsg) c.remove(); });
        grid.appendChild(frag);
      }

      emptyMsg.hidden = data.submissions.length > 0 || cardMap.size > 0;

      // Pagination
      const pages    = Math.ceil(data.total / PER_PAGE);
      const pagEl    = document.getElementById('pagination');
      const info     = document.getElementById('pagination-info');
      const prevBtn  = document.getElementById('prev-btn');
      const nextBtn  = document.getElementById('next-btn');
      pagEl.hidden   = pages <= 1;
      if (info) info.textContent = `Page ${currentPage} of ${pages}`;
      if (prevBtn) prevBtn.disabled = currentPage <= 1;
      if (nextBtn) nextBtn.disabled = currentPage >= pages;

      // Schedule next poll
      schedulePoll(data.submissions);
    }

    function schedulePoll(submissions) {
      clearTimeout(pollTimer);
      const hasDownloading = submissions.some(s => s.status === 'pending' || s.status === 'downloading');
      const hasTranscoding = submissions.some(s => s.status === 'transcoding');
      const delay = hasDownloading ? 3000 : hasTranscoding ? 15000 : 30000;
      pollTimer = setTimeout(async () => {
        const data = await loadPage(currentPage, currentStatus, currentSearch);
        if (data) applyData(data, true);
      }, delay);
    }

    async function navigate(page, status, search) {
      currentPage   = page;
      currentStatus = status !== undefined ? status : currentStatus;
      currentSearch = search  !== undefined ? search  : currentSearch;
      const data = await loadPage(currentPage, currentStatus, currentSearch);
      if (data) {
        await fadeGrid(() => applyData(data, false));
      }
    }

    // ── Filter tabs ────────────────────────────────────────────────────────────

    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        navigate(1, tab.dataset.status, currentSearch);
      });
    });

    // ── Search ────────────────────────────────────────────────────────────────

    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        navigate(1, currentStatus, e.target.value.trim());
      }, 300);
    });

    // ── Pagination ────────────────────────────────────────────────────────────

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentPage > 1) navigate(currentPage - 1);
    });
    document.getElementById('next-btn').addEventListener('click', () => {
      const pages = Math.ceil(currentTotal / PER_PAGE);
      if (currentPage < pages) navigate(currentPage + 1);
    });

    // ── Bulk toolbar ──────────────────────────────────────────────────────────
    document.getElementById('bulk-cancel-btn').addEventListener('click', exitSelectMode);

    document.getElementById('bulk-select-all-btn').addEventListener('click', () => {
      cardMap.forEach((card, id) => {
        const cb = card.querySelector('.card-checkbox');
        selectedIds.add(id);
        card.classList.add('card-selected');
        if (cb) cb.classList.add('is-checked');
      });
      updateBulkCount();
    });

    document.getElementById('bulk-delete-btn').addEventListener('click', () => {
      if (selectedIds.size === 0) return;
      confirmDelete([...selectedIds]);
    });

    // ── Detail modal ──────────────────────────────────────────────────────────
    document.getElementById('detail-close-btn').addEventListener('click', () => {
      document.getElementById('detail-modal').hidden = true;
    });
    document.getElementById('detail-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('detail-modal'))
        document.getElementById('detail-modal').hidden = true;
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('detail-modal').hidden = true;
        document.getElementById('confirm-modal').hidden = true;
      }
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    navigate(1, 'all', '');
  </script>
</body>
</html>
