# docker-compose.yml
services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tubemin

  tubemin:
    build: ./server
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./data/downloads:/downloads
      - ./data/peertube-import:/peertube-import
      - tubemin_data:/data
    depends_on:
      - metube
      - peertube

  metube:
    image: ghcr.io/alexta69/metube:latest
    restart: unless-stopped
    volumes:
      - ./data/downloads:/downloads
    environment:
      DOWNLOAD_DIR: /downloads
      YTDL_OPTIONS: '{"writeinfojson": true, "writethumbnail": true, "writesubtitles": true, "writeautomaticsub": true}'

  peertube:
    image: chocobozzz/peertube:production-bookworm
    restart: unless-stopped
    env_file: .env
    ports:
      - "9000:9000"
    volumes:
      - peertube_data:/data
      - ./data/peertube-import:/peertube-import
    depends_on:
      - peertube_db
      - peertube_redis
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/api/v1/config > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  peertube_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: peertube
      POSTGRES_USER: peertube
      POSTGRES_PASSWORD: ${PEERTUBE_DB_PASSWORD}
    volumes:
      - peertube_db_data:/var/lib/postgresql/data

  peertube_redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - peertube_redis_data:/data

  # One-shot init: installs PeerTube OIDC plugin and sets requiresAuth.
  # Idempotent — safe to re-run on each `docker compose up`.
  # To run manually: docker compose run --rm peertube_init
  peertube_init:
    image: alpine:3.21
    env_file: .env
    volumes:
      - ./scripts/peertube-init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "-e", "/init.sh"]
    restart: "no"
    depends_on:
      peertube:
        condition: service_healthy

volumes:
  tubemin_data:
  caddy_data:
  caddy_config:
  peertube_data:
  peertube_db_data:
  peertube_redis_data:
