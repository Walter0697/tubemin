# docker-compose.yml
services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tubemin

  tubemin:
    build: ./server
    restart: unless-stopped
    env_file: .env
    volumes:
      - downloads:/downloads
      - peertube_import:/peertube-import
      - tubemin_data:/data
    depends_on:
      - metube

  metube:
    image: ghcr.io/alexta69/metube:latest
    restart: unless-stopped
    volumes:
      - downloads:/downloads
    environment:
      DOWNLOAD_DIR: /downloads

  peertube:
    image: chocobozzz/peertube:production-bookworm
    restart: unless-stopped
    env_file: .env
    volumes:
      - peertube_data:/data
      - peertube_import:/peertube-import
    depends_on:
      - peertube_db
      - peertube_redis

  peertube_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: peertube
      POSTGRES_USER: peertube
      POSTGRES_PASSWORD: ${PEERTUBE_DB_PASSWORD}
    volumes:
      - peertube_db_data:/var/lib/postgresql/data

  peertube_redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - peertube_redis_data:/data

volumes:
  downloads:
  peertube_import:
  tubemin_data:
  caddy_data:
  caddy_config:
  peertube_data:
  peertube_db_data:
  peertube_redis_data:
